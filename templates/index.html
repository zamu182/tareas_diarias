<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Tablero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='estilo.css') }}">
</head>
<body class="bg-light p-4">
<div class="container-fluid">
    <div class="d-flex justify-content-between mb-4"><h2>Mi Tablero</h2><a href="/archivo" class="btn btn-outline-secondary">Ver Archivo 📦</a></div>
    <div class="row">
        <div class="col-md-3">
            <div class="card shadow-sm p-3"><h5>Registrar Actividad</h5>
                <form action="/agregar" method="POST">
                    <input type="text" class="form-control mb-2" name="tarea" placeholder="Título" required>
                    <textarea class="form-control mb-2" name="descripcion" placeholder="Descripción"></textarea>
                    <input type="date" class="form-control mb-2" name="fecha" required>
                    <select class="form-select mb-3" name="prioridad"><option value="Alta">Alta</option><option value="Media" selected>Media</option><option value="Baja">Baja</option></select>
                    <button type="submit" class="btn btn-primary w-100">Guardar</button>
                </form>
            </div>
        </div>
        <div class="col-md-9">
            <div class="card shadow-sm p-3 mb-4"><div id="calendar"></div></div>
            <div class="card shadow-sm p-3"><h5>Tareas Activas</h5>
                {% for t in tareas %}
                <div class="d-flex justify-content-between align-items-center p-3 mb-2 border rounded shadow-sm {% if t.prioridad == 'Alta' %}prioridad-alta{% elif t.prioridad == 'Media' %}prioridad-media{% else %}prioridad-baja{% endif %}">
                    <div><strong>{{ t.texto }}</strong><div class="text-muted small">{{ t.descripcion }}</div></div>
                    <div><a href="/check/{{t.id}}" class="btn btn-sm btn-outline-success">✓</a> <a href="/archivar/{{t.id}}" class="btn btn-sm btn-outline-secondary">📦</a></div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
<script>document.addEventListener('DOMContentLoaded', function(){ new FullCalendar.Calendar(document.getElementById('calendar'), {initialView: 'dayGridMonth', locale: 'es', height: 350, events: '/api/tareas'}).render(); });</script>
</body>
</html>
