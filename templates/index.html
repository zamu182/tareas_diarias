<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tablero</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tu estilo personalizado -->
    <link rel="stylesheet" href="{{ url_for('static', filename='estilo.css') }}">
</head>
<body class="bg-light">

<div class="container py-5">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Mi Tablero</h2>
        <a href="/archivo" class="btn btn-outline-secondary">Ver Archivo 📦</a>
    </div>

    <div class="row">
        <!-- Formulario -->
        <div class="col-md-4">
            <div class="card shadow-sm p-4 mb-4">
                <h5 class="mb-3">Registrar Actividad</h5>
                <form action="/agregar" method="POST">
                    <div class="mb-2">
                        <input type="text" class="form-control" name="tarea" placeholder="Título" required>
                    </div>
                    <div class="mb-2">
                        <textarea class="form-control" name="descripcion" placeholder="Descripción"></textarea>
                    </div>
                    <div class="mb-2">
                        <input type="date" class="form-control" name="fecha" required>
                    </div>
                    <div class="mb-3">
                        <select class="form-select" name="prioridad">
                            <option value="Alta">Prioridad Alta</option>
                            <option value="Media" selected>Prioridad Media</option>
                            <option value="Baja">Prioridad Baja</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Guardar</button>
                </form>
            </div>
        </div>

        <!-- Lista de tareas -->
        <div class="col-md-8">
            <div class="card shadow-sm p-4">
                <h5 class="mb-3">Tareas Activas</h5>
                {% for t in tareas %}
                <div class="d-flex justify-content-between align-items-center p-3 mb-2 border rounded shadow-sm 
                    {% if t.prioridad == 'Alta' %}prioridad-alta{% elif t.prioridad == 'Media' %}prioridad-media{% else %}prioridad-baja{% endif %}">
                    <div>
                        <strong>{{ t.texto }}</strong>
                        <div class="text-muted small">{{ t.descripcion }}</div>
                    </div>
                    <div>
                        <a href="/check/{{t.id}}" class="btn btn-sm btn-outline-success">✓</a>
                        <a href="/archivar/{{t.id}}" class="btn btn-sm btn-outline-secondary">📦</a>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>

</body>
</html>
