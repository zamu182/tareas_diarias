<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='estilo.css') }}">
</head>
<body>
    <div class="container-fluid py-3">
        <div class="row">
            <div class="col-12 col-lg-3">
                <div class="dashboard-card">
                    <h4>Nueva Actividad</h4>
                    <form action="/agregar" method="POST">
                        <input type="text" class="form-control mb-2" name="tarea" placeholder="Título" required>
                        <textarea class="form-control mb-2" name="descripcion" placeholder="Descripción"></textarea>
                        <input type="date" class="form-control mb-2" name="fecha" required>
                        <select class="form-select mb-2" name="prioridad">
                            <option value="Alta">Alta</option>
                            <option value="Media" selected>Media</option>
                            <option value="Baja">Baja</option>
                        </select>
                        <button type="submit" class="btn btn-info w-100">Guardar Tarea</button>
                    </form>
                </div>
                <div class="dashboard-card">
                    <h4>Historial</h4>
                    {% for t in tareas %}
                    <div class="mb-3 border-bottom border-secondary pb-2 
                        {% if t.prioridad == 'Alta' %}prioridad-alta
                        {% elif t.prioridad == 'Media' %}prioridad-media
                        {% elif t.prioridad == 'Baja' %}prioridad-baja{% endif %}">
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="{{ 'tarea-hecha' if t.completo else '' }}"><strong>{{t.texto}}</strong></span>
                            <div>
                                <a href="/check/{{t.id}}" class="btn btn-sm btn-success">✓</a>
                                <a href="/eliminar/{{t.id}}" class="btn btn-sm btn-danger" onclick="return confirm('¿Seguro?')">X</a>
                            </div>
                        </div>
                        {% if t.descripcion %}<small class="text-info"><em>{{ t.descripcion }}</em></small>{% endif %}
                    </div>
                    {% endfor %}
                </div>
            </div>
            <div class="col-12 col-lg-9">
                <div class="dashboard-card"><div id="calendar"></div></div>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                locale: 'es',
                height: 'auto',
                events: '/api/tareas'
            }).render();
        });
        setInterval(function() { window.location.reload(); }, 30000);
    </script>
</body>
</html>
