<body>
    <div class="container-fluid py-4">
        <div class="d-flex justify-content-between mb-3">
            <h3>Mi Tablero</h3>
            <a href="/archivo" class="btn btn-outline-secondary">Ver Archivo 📦</a>
        </div>
        <div class="row g-4">
            <div class="col-12 col-lg-3">
                <div class="dashboard-card">
                    <h5>Registrar Actividad</h5>
                    <form action="/agregar" method="POST">
                        <input type="text" class="form-control mb-3" name="tarea" placeholder="Título" required>
                        <textarea class="form-control mb-3" name="descripcion" placeholder="Descripción"></textarea>
                        <input type="date" class="form-control mb-3" name="fecha" required>
                        <select class="form-select mb-3" name="prioridad">
                            <option value="Alta">Prioridad Alta</option>
                            <option value="Media" selected>Prioridad Media</option>
                            <option value="Baja">Prioridad Baja</option>
                        </select>
                        <button type="submit" class="btn btn-primary w-100">Guardar</button>
                    </form>
                </div>
            </div>
            <div class="col-12 col-lg-9">
                <div class="dashboard-card mb-4"><div id="calendar"></div></div>
                <div class="dashboard-card">
                    <h5 class="mb-3">Tareas Activas</h5>
                    {% for t in tareas %}
                    <div class="d-flex justify-content-between align-items-center p-3 mb-2 border rounded 
                         {% if t.prioridad == 'Alta' %}prioridad-alta{% elif t.prioridad == 'Media' %}prioridad-media{% else %}prioridad-baja{% endif %}">
                        <div><strong>{{ t.texto }}</strong><div class="small text-muted">{{ t.descripcion }}</div></div>
                        <div>
                            <a href="/check/{{t.id}}" class="btn btn-sm btn-outline-success">✓</a>
                            <a href="/archivar/{{t.id}}" class="btn btn-sm btn-outline-secondary">📦</a>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
    </body>
</html>
