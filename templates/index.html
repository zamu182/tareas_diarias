<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tablero Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #fff; }
        .dashboard-card { background-color: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        #calendar { height: 600px; color: #000; }
        .tarea-hecha { text-decoration: line-through; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="container-fluid py-4">
        <div class="row">
            <div class="col-md-3">
                <div class="dashboard-card">
                    <h4>Nueva Actividad</h4>
                    <form action="/agregar" method="POST">
                        <input type="text" class="form-control mb-2" name="tarea" placeholder="Título" required>
                        <textarea class="form-control mb-2" name="descripcion" placeholder="Descripción detallada"></textarea>
                        <input type="date" class="form-control mb-2" name="fecha" required>
                        <select class="form-select mb-2" name="prioridad">
                            <option value="Alta">Alta</option><option value="Media" selected>Media</option><option value="Baja">Baja</option>
                        </select>
                        <button type="submit" class="btn btn-info w-100">Guardar Tarea</button>
                    </form>
                </div>
                
                <div class="dashboard-card">
                    <h4>Historial de Tareas</h4>
                    {% for t in tareas %}
                    <div class="mb-3 border-bottom border-secondary pb-2">
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="{{ 'tarea-hecha' if t.completo else '' }}">
                                <strong>{{t.texto}}</strong> ({{t.prioridad}})
                            </span>
                            <div>
                                <a href="/check/{{t.id}}" class="btn btn-sm btn-success">✓</a>
                                <a href="/eliminar/{{t.id}}" class="btn btn-sm btn-danger">X</a>
                            </div>
                        </div>
                        {% if t.descripcion %}
                            <small class="text-info" style="display: block; margin-top: 5px;">
                                <em>{{ t.descripcion }}</em>
                            </small>
                        {% endif %}
                    </div>
                    {% endfor %}
                </div>
            </div>
            
            <div class="col-md-9">
                <div class="dashboard-card"><div id="calendar"></div></div>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'es',
                events: '/api/tareas',
                // Esta función toma la descripción y la pone en el título del elemento HTML del calendario
                eventDidMount: function(info) {
                    if (info.event.extendedProps.description) {
                        info.el.setAttribute('title', info.event.extendedProps.description);
                    }
                }
            });
            calendar.render();
        });
    </script>
</body>
</html>
