<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero de Gestión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='estilo.css') }}">
</head>
<body>
    <div class="container-fluid py-4">
        <div class="row g-4">
            <div class="col-12 col-lg-3">
                <div class="dashboard-card">
                    <h5 class="mb-3">Registrar Actividad</h5>
                    <form action="/agregar" method="POST">
                        <input type="text" class="form-control mb-3" name="tarea" placeholder="Nombre de la tarea" required>
                        <textarea class="form-control mb-3" name="descripcion" placeholder="Descripción breve"></textarea>
                        <input type="date" class="form-control mb-3" name="fecha" required>
                        <select class="form-select mb-3" name="prioridad">
                            <option value="Alta">Prioridad Alta</option>
                            <option value="Media" selected>Prioridad Media</option>
                            <option value="Baja">Prioridad Baja</option>
                        </select>
                        <button type="submit" class="btn btn-primary w-100">Guardar Tarea</button>
                    </form>
                </div>
            </div>

            <div class="col-12 col-lg-9">
                <div class="dashboard-card mb-4">
                    <div id="calendar"></div>
                </div>
                <div class="dashboard-card">
                    <h5 class="mb-3">Historial Reciente</h5>
                    {% for t in tareas %}
                    <div class="d-flex justify-content-between align-items-center p-3 mb-2 border rounded 
                         {% if t.prioridad == 'Alta' %}prioridad-alta{% elif t.prioridad == 'Media' %}prioridad-media{% else %}prioridad-baja{% endif %}">
                        <div>
                            <strong class="{{ 'text-decoration-line-through text-muted' if t.completo }}">{{ t.texto }}</strong>
                            <div class="small text-muted">{{ t.descripcion }}</div>
                        </div>
                        <div>
                            <a href="/check/{{t.id}}" class="btn btn-sm btn-outline-success me-2">✓</a>
                            <a href="/eliminar/{{t.id}}" class="btn btn-sm btn-outline-danger">✕</a>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                locale: 'es',
                height: 'auto',
                events: '/api/tareas'
            }).render();
        });
        setInterval(() => { window.location.reload(); }, 60000);
    </script>
</body>
</html>
