<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='estilo.css') }}">
    <title>Mi Tablero</title>
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Mi Tablero</h2>
        <a href="/archivo" class="btn btn-outline-secondary"><i class="bi bi-archive"></i> Ver Archivo</a>
    </div>
    
    <div class="row">
        <div class="col-md-4">
            <div class="card p-4 shadow-sm">
                <h5>Nueva Actividad</h5>
                <form action="/agregar" method="POST">
                    <input type="text" class="form-control mb-2" name="tarea" placeholder="Título" required>
                    <textarea class="form-control mb-2" name="descripcion" placeholder="Descripción"></textarea>
                    <input type="date" class="form-control mb-2" name="fecha" required>
                    <select class="form-select mb-3" name="prioridad">
                        <option value="Alta">Alta</option><option value="Media" selected>Media</option><option value="Baja">Baja</option>
                    </select>
                    <button type="submit" class="btn btn-primary w-100">Guardar</button>
                </form>
            </div>
        </div>
        <div class="col-md-8">
            {% for t in tareas %}
            <div class="card mb-3 shadow-sm border-0 border-start border-5 {% if t.prioridad == 'Alta' %}border-danger{% else %}border-warning{% endif %}">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <h5 class="mb-0">{{ t.texto }}</h5>
                        <small class="text-muted">{{ t.descripcion }} - {{ t.fecha }}</small>
                    </div>
                    <div>
                        <a href="/check/{{t.id}}" class="btn btn-sm btn-outline-success"><i class="bi bi-check-lg"></i></a>
                        <a href="/archivar/{{t.id}}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-box-arrow-in-down"></i></a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
</body>
</html>
