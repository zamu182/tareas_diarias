<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='estilo.css') }}">
    <title>Archivo</title>
</head>
<body class="bg-light p-4">
<div class="container">
    <div class="d-flex justify-content-between mb-4"><h3>📦 Archivo de Tareas</h3><a href="/" class="btn btn-primary">← Volver</a></div>
    {% for t in tareas %}
    <div class="card shadow-sm p-3 mb-3 border-start border-5 {% if t.prioridad == 'Alta' %}border-danger{% elif t.prioridad == 'Media' %}border-warning{% else %}border-success{% endif %}">
        <div class="d-flex justify-content-between align-items-center">
            <div><strong class="{{ 'text-decoration-line-through text-muted' if t.completo }}">{{ t.texto }}</strong><div class="text-muted small">{{ t.descripcion }}</div><div class="badge bg-secondary mt-1">{{ t.fecha }}</div></div>
            <div>{% if t.completo %}<span class="badge bg-success">Completada ✓</span>{% else %}<span class="badge bg-danger">No finalizada ✗</span>{% endif %}</div>
        </div>
    </div>
    {% endfor %}
</div>
</body>
</html>
