<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Archivo de Tareas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='estilo.css') }}">
</head>
<body class="bg-light p-4">

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3><i class="bi bi-archive"></i> Archivo de Tareas</h3>
        <a href="/" class="btn btn-primary">Volver al Tablero</a>
    </div>

    {% for t in tareas %}
    <div class="card mb-3 shadow-sm border-0 border-start border-5 
         {% if t.prioridad == 'Alta' %}border-danger{% elif t.prioridad == 'Media' %}border-warning{% else %}border-success{% endif %}">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div>
                <h5 class="mb-0 text-decoration-line-through text-muted">{{ t.texto }}</h5>
                <small class="text-muted">{{ t.descripcion }} - {{ t.fecha }}</small>
            </div>
            <a href="/eliminar_definitivo/{{t.id}}" class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Seguro que deseas eliminar esta tarea?')">
                <i class="bi bi-trash"></i>
            </a>
        </div>
    </div>
    {% else %}
    <div class="text-center mt-5 text-muted">
        <i class="bi bi-emoji-smile" style="font-size: 3rem;"></i>
        <p>Tu archivo está limpio.</p>
    </div>
    {% endfor %}
</div>

</body>
</html>
