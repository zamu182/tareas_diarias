<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Archivo y Calendario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='estilo.css') }}">
</head>
<body class="bg-light p-4">

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3><i class="bi bi-archive"></i> Archivo y Calendario</h3>
        <a href="/" class="btn btn-primary">Volver al Tablero</a>
    </div>

    <div class="row">
        <!-- Calendario en el Archivo -->
        <div class="col-md-5">
            <div id='calendar' class="bg-white p-3 shadow-sm rounded border"></div>
        </div>

        <!-- Lista de tareas archivadas -->
        <div class="col-md-7">
            {% for t in tareas %}
            <div class="card mb-3 shadow-sm border-0 border-start border-5 
                 {% if t.prioridad == 'Alta' %}border-danger{% elif t.prioridad == 'Media' %}border-warning{% else %}border-success{% endif %}">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <h5 class="mb-1 text-decoration-line-through text-muted">{{ t.texto }}</h5>
                        <small class="text-muted d-block">{{ t.descripcion }} - {{ t.fecha }}</small>
                        <div class="mt-2">
                            {% if t.completo %}
                                <span class="badge bg-success"><i class="bi bi-check-circle"></i> Finalizada</span>
                            {% else %}
                                <span class="badge bg-secondary"><i class="bi bi-box-arrow-in-down"></i> Archivada</span>
                            {% endif %}
                        </div>
                    </div>
                    <a href="/eliminar_definitivo/{{t.id}}" class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Seguro?')">
                        <i class="bi bi-trash"></i>
                    </a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    new FullCalendar.Calendar(document.getElementById('calendar'), {
      initialView: 'dayGridMonth',
      locale: 'es',
      events: '/api/tareas'
    }).render();
  });
</script>
</body>
</html>
