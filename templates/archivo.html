<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='estilo.css') }}">
    <title>Archivo</title>
</head>
<body class="p-4 bg-light">
    <div class="dashboard-card">
        <a href="/" class="btn btn-sm btn-primary mb-3">← Volver</a>
        <h3>Tareas Archivadas</h3>
        <table class="table">
            <thead><tr><th>Tarea</th><th>Fecha</th></tr></thead>
            <tbody>
                {% for t in tareas %}
                <tr><td>{{t.texto}}</td><td>{{t.fecha}}</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
