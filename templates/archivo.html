<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Archivo de Tareas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='estilo.css') }}">
</head>
<body class="bg-light p-4">
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>📦 Archivo de Tareas</h3>
        <a href="/" class="btn btn-primary">← Volver al Tablero</a>
    </div>

    {% for t in tareas %}
    <div class="card shadow-sm p-3 mb-3 border-start border-5 
         {% if t.prioridad == 'Alta' %}border-danger{% elif t.prioridad == 'Media' %}border-warning{% else %}border-success{% endif %}">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h5 class="mb-1 {{ 'text-decoration-line-through text-muted' if t.completo else '' }}">{{ t.texto }}</h5>
                <p class="mb-1 text-muted small">{{ t.descripcion }}</p>
                <span class="badge bg-secondary">{{ t.fecha }}</span>
            </div>
            <div class="d-flex align-items-center gap-2">
                {% if t.completo %}<span class="badge bg-success">Completada ✓</span>{% else %}<span class="badge bg-danger">No finalizada ✗</span>{% endif %}
                <a href="/eliminar_definitivo/{{t.id}}" class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Eliminar permanentemente?')">Eliminar</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
</body>
</html>
